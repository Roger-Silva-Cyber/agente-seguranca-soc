<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ SOC Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
        }

        header {
            background: #161b22;
            padding: 20px 40px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1.4rem;
            color: #58a6ff;
        }

        header span {
            font-size: 0.8rem;
            color: #8b949e;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 24px 40px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
        }

        .card h3 {
            font-size: 0.75rem;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .card .valor {
            font-size: 2rem;
            font-weight: bold;
        }

        .card .sub {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 4px;
        }

        .verde {
            color: #3fb950;
        }

        .amarelo {
            color: #d29922;
        }

        .vermelho {
            color: #f85149;
        }

        .azul {
            color: #58a6ff;
        }

        .section {
            padding: 0 40px 24px;
        }

        .section h2 {
            font-size: 1rem;
            color: #8b949e;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .alerta {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .alerta.critico {
            border-left: 3px solid #f85149;
        }

        .alerta.alto {
            border-left: 3px solid #d29922;
        }

        .alerta.medio {
            border-left: 3px solid #58a6ff;
        }

        .alerta.baixo {
            border-left: 3px solid #3fb950;
        }

        .alerta .hora {
            font-size: 0.75rem;
            color: #8b949e;
            min-width: 60px;
        }

        .alerta .texto {
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
        }

        .badge.critico {
            background: #f8514922;
            color: #f85149;
        }

        .badge.alto {
            background: #d2992222;
            color: #d29922;
        }

        .badge.medio {
            background: #58a6ff22;
            color: #58a6ff;
        }

        .badge.baixo {
            background: #3fb95022;
            color: #3fb950;
        }

        .barra-bg {
            background: #21262d;
            border-radius: 4px;
            height: 6px;
            margin-top: 8px;
        }

        .barra {
            height: 6px;
            border-radius: 4px;
            transition: width 0.5s;
        }

        .normal {
            color: #3fb950;
            font-size: 0.9rem;
            padding: 20px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #8b949e;
            font-size: 0.75rem;
            border-top: 1px solid #30363d;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <header>
        <span style="font-size:1.5rem">🛡️</span>
        <div>
            <h1>SOC Dashboard</h1>
            <span id="ultima-atualizacao">Carregando...</span>
        </div>
    </header>

    <div class="grid">
        <div class="card">
            <h3>CPU</h3>
            <div class="valor" id="cpu-val">--</div>
            <div class="sub">Utilização atual</div>
            <div class="barra-bg">
                <div class="barra verde" id="cpu-barra" style="width:0%"></div>
            </div>
        </div>
        <div class="card">
            <h3>RAM</h3>
            <div class="valor" id="ram-val">--</div>
            <div class="sub">Utilização atual</div>
            <div class="barra-bg">
                <div class="barra azul" id="ram-barra" style="width:0%"></div>
            </div>
        </div>
        <div class="card">
            <h3>Conexões</h3>
            <div class="valor azul" id="con-val">--</div>
            <div class="sub">Ativas agora</div>
        </div>
        <div class="card">
            <h3>Arquivos monitorados</h3>
            <div class="valor azul" id="arq-val">--</div>
            <div class="sub">No baseline</div>
        </div>
        <div class="card">
            <h3>Alertas hoje</h3>
            <div class="valor" id="alertas-val">--</div>
            <div class="sub">Eventos detectados</div>
        </div>
        <div class="card">
            <h3>Status</h3>
            <div class="valor verde" id="status-val">--</div>
            <div class="sub">Sistema</div>
        </div>
    </div>

    <div class="section">
        <h2>Alertas recentes</h2>
        <div id="alertas-lista"></div>
    </div>

    <footer>Agente de Segurança SOC — Roger Silva | Atualiza a cada 10 segundos</footer>

    <script>
        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function atualizar() {
            try {
                const r = await fetch('/api/status');
                if (!r.ok) {
                    throw new Error('Falha HTTP status: ' + r.status);
                }
                const d = await r.json();

                document.getElementById('cpu-val').textContent = d.cpu + '%';
                document.getElementById('cpu-val').className = 'valor ' + (d.cpu > 80 ? 'vermelho' : d.cpu > 60 ? 'amarelo' : 'verde');
                document.getElementById('cpu-barra').style.width = d.cpu + '%';
                document.getElementById('cpu-barra').className = 'barra ' + (d.cpu > 80 ? 'vermelho' : d.cpu > 60 ? 'amarelo' : 'verde');

                document.getElementById('ram-val').textContent = d.ram + '%';
                document.getElementById('ram-val').className = 'valor ' + (d.ram > 85 ? 'vermelho' : d.ram > 70 ? 'amarelo' : 'verde');
                document.getElementById('ram-barra').style.width = d.ram + '%';

                document.getElementById('con-val').textContent = d.conexoes;
                document.getElementById('arq-val').textContent = d.arquivos_monitorados;
                document.getElementById('alertas-val').textContent = d.total_alertas_hoje;
                document.getElementById('alertas-val').className = 'valor ' + (d.total_alertas_hoje > 0 ? 'vermelho' : 'verde');

                document.getElementById('status-val').textContent = d.status;
                let statusClass = 'verde';
                if (d.status === 'CRÍTICO' || d.status === 'CRITICO' || d.status === 'ALTO') {
                    statusClass = 'vermelho';
                } else if (d.status === 'MÉDIO' || d.status === 'MEDIO') {
                    statusClass = 'amarelo';
                } else if (d.status === 'Normal') {
                    statusClass = 'verde';
                } else {
                    statusClass = 'azul';
                }
                document.getElementById('status-val').className = 'valor ' + statusClass;

                document.getElementById('ultima-atualizacao').textContent = 'Última atualização: ' + d.hora;

                const lista = document.getElementById('alertas-lista');
                lista.textContent = '';
                if (!d.eventos || d.eventos.length === 0) {
                    const divNormal = document.createElement('div');
                    divNormal.className = 'normal';
                    divNormal.textContent = '✅ Nenhum alerta detectado hoje';
                    lista.appendChild(divNormal);
                } else {
                    d.eventos.slice().reverse().forEach(e => {
                        const nivel = e.risco ? e.risco.toLowerCase() : 'baixo';

                        const divAlerta = document.createElement('div');
                        divAlerta.className = `alerta ${nivel}`;

                        const spanHora = document.createElement('span');
                        spanHora.className = 'hora';
                        spanHora.textContent = e.hora;
                        divAlerta.appendChild(spanHora);

                        const divTexto = document.createElement('div');
                        divTexto.className = 'texto';

                        const badge = document.createElement('span');
                        badge.className = `badge ${nivel}`;
                        badge.textContent = e.risco || 'INFO';
                        divTexto.appendChild(badge);

                        divTexto.appendChild(document.createElement('br'));
                        divTexto.appendChild(document.createElement('br'));

                        if (Array.isArray(e.alertas)) {
                            e.alertas.forEach(alerta => {
                                const spanAlerta = document.createElement('span');
                                spanAlerta.textContent = alerta;
                                divTexto.appendChild(spanAlerta);
                                divTexto.appendChild(document.createElement('br'));
                            });
                        } else if (e.alertas) {
                            const spanAlerta = document.createElement('span');
                            spanAlerta.textContent = e.alertas;
                            divTexto.appendChild(spanAlerta);
                            divTexto.appendChild(document.createElement('br'));
                        }

                        divTexto.appendChild(document.createElement('br'));

                        if (e.analise) {
                            const smallAnalise = document.createElement('small');
                            smallAnalise.style.color = '#8b949e';
                            const analiseTexto = escapeHTML(e.analise).split('\n').join('<br>');
                            smallAnalise.innerHTML = analiseTexto;
                            divTexto.appendChild(smallAnalise);
                        }

                        if (Array.isArray(e.acoes) && e.acoes.length > 0) {
                            const divAcoes = document.createElement('div');
                            divAcoes.style.marginTop = '10px';
                            divAcoes.style.paddingTop = '8px';
                            divAcoes.style.borderTop = '1px dashed #30363d';
                            divAcoes.style.display = 'flex';
                            divAcoes.style.flexDirection = 'column';
                            divAcoes.style.gap = '4px';

                            e.acoes.forEach(acao => {
                                const acao_str = acao.toString();
                                let icon = '';
                                if (!acao_str.startsWith('✅') && !acao_str.startsWith('⚠️') && !acao_str.startsWith('❌')) {
                                    icon = '✅ ';
                                }

                                const divAcao = document.createElement('div');
                                divAcao.style.fontSize = '0.75rem';
                                divAcao.style.color = '#8b949e';
                                divAcao.style.display = 'flex';
                                divAcao.style.alignItems = 'center';
                                divAcao.style.gap = '6px';

                                const spanAcao = document.createElement('span');
                                spanAcao.textContent = icon + acao_str;
                                divAcao.appendChild(spanAcao);
                                divAcoes.appendChild(divAcao);
                            });

                            divTexto.appendChild(divAcoes);
                        }

                        divAlerta.appendChild(divTexto);
                        lista.appendChild(divAlerta);
                    });
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status-val').textContent = '⚠️ ERRO DE API';
                document.getElementById('status-val').className = 'valor vermelho';

                const ultimaAtualizacao = document.getElementById('ultima-atualizacao');
                ultimaAtualizacao.textContent = '';
                const spanError = document.createElement('span');
                spanError.style.color = '#f85149';
                spanError.textContent = `⚠️ Falha na conexão com o agente (${e.message})`;
                ultimaAtualizacao.appendChild(spanError);

                const lista = document.getElementById('alertas-lista');
                lista.textContent = '';
                const divError = document.createElement('div');
                divError.style.background = '#f8514922';
                divError.style.border = '1px solid #f85149';
                divError.style.borderRadius = '8px';
                divError.style.padding = '16px';
                divError.style.color = '#f85149';
                divError.style.textAlign = 'center';

                const strongError = document.createElement('strong');
                strongError.textContent = '⚠️ Erro ao atualizar o painel: ';
                divError.appendChild(strongError);

                const textError = document.createTextNode('Não foi possível obter resposta da API status. Verifique se o agente está rodando.');
                divError.appendChild(textError);

                lista.appendChild(divError);
            }
        }

        atualizar();
        setInterval(atualizar, 10000);
    </script>
</body>

</html>
